<!-- src/app/pages/principal/principal.component.html -->
<div class="principal-wrapper">
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-mark">⬡</span>
      <span class="sys-name">SISTEMAPRO</span>
    </div>
    <div class="topbar-right">
      <span class="clock">{{ hora }}</span>
      <span class="user-badge">{{ nombre }}</span>
    </div>
  </header>

  <main class="dashboard">
    <div class="welcome-block">
      <h2>Bienvenido, <span>{{ nombre }}</span></h2>
      <p>Seleccione una opción para continuar</p>
    </div>

    <div class="menu-grid">
      <div class="menu-card" (click)="irBuscador()">
        <div class="card-icon">🔍</div>
        <h3>Buscador de Productos</h3>
        <p>Consulte información detallada por código de producto</p>
        <span class="card-arrow">→</span>
      </div>

      <div class="menu-card disabled">
        <div class="card-icon">📊</div>
        <h3>Reportes</h3>
        <p>Módulo próximamente disponible</p>
      </div>

      <div class="menu-card disabled">
        <div class="card-icon">⚙️</div>
        <h3>Configuración</h3>
        <p>Módulo próximamente disponible</p>
      </div>
    </div>
  </main>

  <footer class="footer-bar">
    <button class="btn-salir" (click)="salir()">
      ⏻ Salir del sistema
    </button>
  </footer>
</div>
